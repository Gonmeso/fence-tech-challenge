repos:
  - repo: local
    hooks:
      - id: backend-ruff-format
        name: backend-ruff-format
        entry: bash -c 'cd backend && uv run ruff format .'
        language: system
        always_run: true
        pass_filenames: false
        files: ^backend/.*\.py$
      - id: backend-ruff-check
        name: backend-ruff-check
        entry: bash -c 'cd backend && uv run ruff check --fix .'
        language: system
        always_run: true
        pass_filenames: false
        files: ^backend/.*\.py$
      - id: backend-ty-check
        name: backend-ty-check
        entry: bash -c 'cd backend && uv run ty check .'
        language: system
        always_run: true
        pass_filenames: false
        files: ^backend/.*\.py$
